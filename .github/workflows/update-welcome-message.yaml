name: Update Welcome Message (Simple)

on:
  workflow_dispatch:
    inputs:
      welcome_html:
        description: 'HTML текст приветственного сообщения'
        required: true
        default: '<b>Новое содержание</b>'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create welcome message
      run: |
        cat > welcome_message.txt << 'EOF'
        ${{ github.event.inputs.welcome_html }}
        EOF
        echo "✅ Welcome message created"
    
    - name: Copy and restart
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          # Создаем директорию если нужно
          mkdir -p ${{ secrets.SERVER_PATH }}
          
          # Копируем файл через cat (вместо SCP)
          cat > ${{ secrets.SERVER_PATH }}/welcome_message.txt << 'ENDSSH'
          ${{ github.event.inputs.welcome_html }}
          ENDSSH
          
          # Проверяем файл
          echo "📄 File content:"
          cat ${{ secrets.SERVER_PATH }}/welcome_message.txt
          
          # Перезапускаем контейнер
          docker restart chatl-bot
          
          echo "✅ Update complete"
