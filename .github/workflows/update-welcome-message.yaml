name: Update Welcome Message

on:
  workflow_dispatch:
    inputs:
      welcome_html_base64:
        description: 'Base64 encoded HTML текст (закодируйте текст тут: https://www.base64encode.org/)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Decode and save
      run: |
        echo "${{ github.event.inputs.welcome_html_base64 }}" | base64 -d > welcome_message.txt
        echo "=== DECODED FILE ==="
        cat welcome_message.txt
    
    - name: Copy to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        source: "welcome_message.txt"
        target: "${{ secrets.SERVER_PATH }}/app/media/"
        overwrite: true
    
    - name: Update bot
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          touch ${{ secrets.SERVER_PATH }}/app/media/welcome_message.txt
          echo "✅ Updated"
