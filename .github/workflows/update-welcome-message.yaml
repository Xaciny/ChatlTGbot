name: Update Welcome Message

on:
  workflow_dispatch:
    inputs:
      welcome_html:
        description: 'HTML текст приветственного сообщения'
        required: true
        default: '<b> Новое содержание </b>'
      update_from_file:
        description: 'Или обновить из файла welcome_message.txt в репозитории'
        required: false
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create welcome message from input
      if: github.event.inputs.update_from_file != 'true'
      run: |
        cat > welcome_message.txt << 'EOF'
        ${{ github.event.inputs.welcome_html }}
        EOF
        echo "✅ Welcome message created from HTML input"
    
    - name: Copy file to server
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "welcome_message.txt"
        target: ${{ secrets.SERVER_PATH }}
        overwrite: true
    
    - name: Clear cache in container
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ${{ secrets.SERVER_PATH }}
          docker exec chatl-bot sh -c "touch /app/welcome_message.txt"
          echo "✅ Welcome message updated and cache cleared"
