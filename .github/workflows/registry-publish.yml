name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      specific_tag:
        description: 'Specific tag to rebuild (leave empty for all missing)'
        required: false
        type: string
      skip_tag:
        description: 'Tag to skip building (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find missing tags and build them
        run: |
          # Приводим к нижнему регистру
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          
          # Имена для разных регистров
          DOCKER_IMAGE="${DOCKER_USER}/${REPO_NAME}"
          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/${REPO_NAME}"
          GHCR_IMAGE=$(echo "$GHCR_IMAGE" | tr '[:upper:]' '[:lower:]')
          
          echo "Docker Hub image: $DOCKER_IMAGE"
          echo "GitHub Packages image: $GHCR_IMAGE"
          
          # Получаем список тегов для проверки
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.specific_tag }}" ]]; then
            TAGS_TO_CHECK="${{ github.event.inputs.specific_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS_TO_CHECK=$(git tag -l)
          else
            TAGS_TO_CHECK="${{ github.ref_name }}"
          fi
          
          # Тег для пропуска
          SKIP_TAG="${{ github.event.inputs.skip_tag }}"
          if [[ -n "$SKIP_TAG" ]]; then
            SKIP_TAG=$(echo "$SKIP_TAG" | tr '[:upper:]' '[:lower:]')
            echo "⚠️ Will skip tag: $SKIP_TAG"
          fi
          
          echo "Will check tags: $TAGS_TO_CHECK"
          echo "---"
          
          BUILT_COUNT=0
          for TAG in $TAGS_TO_CHECK; do
            TAG_LOWER=$(echo "$TAG" | tr '[:upper:]' '[:lower:]')
            
            if [[ -n "$SKIP_TAG" ]] && [[ "$TAG_LOWER" == "$SKIP_TAG" ]]; then
              echo "⏭️ Skipping tag $TAG_LOWER (explicitly skipped)"
              echo "- ⏭️ Skipped \`$TAG_LOWER\` (user requested)" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            
            echo "Processing tag: $TAG_LOWER"
            
            # Проверяем в Docker Hub
            if docker manifest inspect $DOCKER_IMAGE:$TAG_LOWER > /dev/null 2>&1; then
              echo "✅ Tag $TAG_LOWER already exists in Docker Hub, skipping"
              echo "- ⏭️ Skipped \`$TAG_LOWER\` (already exists in Docker Hub)" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            
            echo "❌ Tag $TAG_LOWER not found, building..."
            
            # Чекаутим код для этого тега
            git checkout $TAG
            
            # Сначала билдим и пушим только в Docker Hub
            echo "Building and pushing to Docker Hub..."
            docker buildx build \
              --push \
              --tag $DOCKER_IMAGE:$TAG_LOWER \
              --platform linux/amd64,linux/arm64 \
              . || {
                echo "⚠️ Failed to push to Docker Hub, retrying without cache..."
                docker buildx build \
                  --push \
                  --tag $DOCKER_IMAGE:$TAG_LOWER \
                  --platform linux/amd64,linux/arm64 \
                  --no-cache \
                  .
              }
            
            if [ $? -eq 0 ]; then
              echo "✅ Successfully pushed to Docker Hub: $TAG_LOWER"
              
              # Пробуем запушить в GitHub Packages отдельно
              echo "Pushing to GitHub Packages..."
              docker buildx build \
                --push \
                --tag $GHCR_IMAGE:$TAG_LOWER \
                --platform linux/amd64,linux/arm64 \
                . 2>/dev/null || {
                echo "⚠️ Failed to push to GitHub Packages, skipping..."
              }
              
              echo "- ✅ Pushed \`$TAG_LOWER\` to Docker Hub" >> $GITHUB_STEP_SUMMARY
              BUILT_COUNT=$((BUILT_COUNT + 1))
            else
              echo "❌ Failed to build and push $TAG_LOWER"
              echo "- ❌ Failed \`$TAG_LOWER\`" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "---"
            git checkout -
          done
          
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
          echo "Built $BUILT_COUNT tag(s)" >> $GITHUB_STEP_SUMMARY
          
          if [[ $BUILT_COUNT -eq 0 ]]; then
            echo "No new tags were built (all already exist or were skipped)" >> $GITHUB_STEP_SUMMARY
          fi
