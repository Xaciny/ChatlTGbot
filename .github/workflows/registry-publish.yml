name: Build and Push Docker Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      specific_tag:
        description: 'Specific tag to rebuild (leave empty for all missing)'
        required: false
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Find missing tags and build them
        run: |
          # Приводим к нижнему регистру
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${DOCKER_USER}/${REPO_NAME}"
          
          # Получаем список тегов для проверки
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.specific_tag }}" ]]; then
            # Ручной запуск с указанием конкретного тега
            TAGS_TO_CHECK="${{ github.event.inputs.specific_tag }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Ручной запуск без указания - проверяем все теги
            TAGS_TO_CHECK=$(git tag -l)
          else
            # Автоматический запуск по пушу тега
            TAGS_TO_CHECK="${{ github.ref_name }}"
          fi
          
          echo "Image: $IMAGE_NAME"
          echo "Will check tags: $TAGS_TO_CHECK"
          echo "---"
          
          # Перебираем каждый тег
          for TAG in $TAGS_TO_CHECK; do
            TAG_LOWER=$(echo "$TAG" | tr '[:upper:]' '[:lower:]')
            
            echo "Processing tag: $TAG_LOWER"
            
            # Проверяем, существует ли уже образ
            if docker manifest inspect $IMAGE_NAME:$TAG_LOWER > /dev/null 2>&1; then
              echo "✅ Tag $TAG_LOWER already exists in Docker Hub, skipping"
              continue
            fi
            
            echo "❌ Tag $TAG_LOWER not found, building..."
            
            # Чекаутим код именно для этого тега
            git checkout $TAG
            
            # Билдим и пушим
            docker buildx build \
              --push \
              --tag $IMAGE_NAME:$TAG_LOWER \
              --platform linux/amd64,linux/arm64 \
              .
            
            echo "✅ Successfully pushed $TAG_LOWER"
            echo "- ✅ Pushed \`$TAG_LOWER\`" >> $GITHUB_STEP_SUMMARY
            echo "---"
            
            # Возвращаемся обратно (на случай, если понадобится для следующих тегов)
            git checkout -
          done
          
          echo "## Build complete" >> $GITHUB_STEP_SUMMARY
